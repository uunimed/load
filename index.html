<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>მალე დავბრუნდები</title>
    <style>
        /* ფონტების იმპორტი Google Fonts-დან */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;700&display=swap');

        /* ძირითადი სტილები და ეკრანის განულება */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Sans Georgian', sans-serif;
            background-color: #0b0c10; /* მუქი ფონი */
            color: #66fcf1; /* ნეონისფერი ცისფერი ტექსტისთვის */
        }

        /* ანიმაციის ტილოს პოზიციონირება */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* კონტენტის ცენტრირება */
        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            user-select: none;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 3px;
            font-weight: 700;
            /* ტექსტის მსუბუქი ნათება და ანიმაცია */
            animation: pulse 3s infinite alternate;
        }

        p {
            font-size: 1.5rem;
            margin-top: 15px;
            color: #c5c6c7;
            font-weight: 400;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* მფეთქავი ტექსტის ანიმაცია */
        @keyframes pulse {
            0% {
                transform: scale(1);
                text-shadow: 0 0 10px rgba(102, 252, 241, 0.4);
            }
            100% {
                transform: scale(1.03);
                text-shadow: 0 0 30px rgba(102, 252, 241, 0.9), 0 0 50px rgba(102, 252, 241, 0.4);
            }
        }
    </style>
</head>
<body>

    <!-- ფონის ანიმაციისთვის -->
    <canvas id="bg-canvas"></canvas>

    <!-- მთავარი ტექსტი -->
    <div class="content">
        <h1>მალე დავბრუნდები</h1>
        <p>კომპიუტერი დროებით დატოვებულია</p>
    </div>

    <script>
        // Canvas-ის კონფიგურაცია
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];

        // ეკრანის ზომის ცვლილებაზე რეაგირება
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initParticles();
        }

        window.addEventListener('resize', resize);

        // ნაწილაკის (Particle) კლასი
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5; // ზომა
                this.speedX = Math.random() * 1 - 0.5; // X ღერძზე მოძრაობის სიჩქარე
                this.speedY = Math.random() * 1 - 0.5; // Y ღერძზე მოძრაობის სიჩქარე
                this.color = 'rgba(102, 252, 241, 0.8)';
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                // კედლებიდან ასხლეტა
                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ნაწილაკების ინიციალიზაცია ეკრანის ზომის მიხედვით
        function initParticles() {
            particles = [];
            // რაოდენობის დაანგარიშება ეკრანის ფართობიდან გამომდინარე
            let numParticles = Math.floor((width * height) / 9000); 
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }

        // ნაწილაკებს შორის ხაზების გავლება (ქსელის ეფექტი)
        function connectParticles() {
            for (let a = 0; a < particles.length; a++) {
                for (let b = a; b < particles.length; b++) {
                    let dx = particles[a].x - particles[b].x;
                    let dy = particles[a].y - particles[b].y;
                    let distance = dx * dx + dy * dy;

                    // თუ ნაწილაკები ახლოს არიან, ვაერთებთ ხაზით
                    if (distance < 12000) {
                        // მანძილის მიხედვით ხაზის გამჭვირვალობის დადგენა
                        let opacity = 0.15 - (distance / 80000);
                        ctx.strokeStyle = `rgba(102, 252, 241, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particles[a].x, particles[a].y);
                        ctx.lineTo(particles[b].x, particles[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // მთავარი ანიმაციის ციკლი
        function animate() {
            ctx.clearRect(0, 0, width, height); // წინა კადრის წაშლა
            
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }
            connectParticles();
            
            requestAnimationFrame(animate);
        }

        // გაშვება
        resize();
        animate();
    </script>
</body>
</html>
